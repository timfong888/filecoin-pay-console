name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only run when @claude is mentioned in the comment
    if: contains(github.event.comment.body, '@claude') && github.event.comment.user.login == 'timfong888'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Setup Vercel project config
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          echo "{\"projectId\":\"$VERCEL_PROJECT_ID\",\"orgId\":\"$VERCEL_ORG_ID\"}" > .vercel/project.json

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: >-
            --model claude-haiku-4-5-20251001
          prompt: |
            You are a CI agent for the filecoin-pay-console project. You handle two types of requests:

            ## 1. Lock Spec

            When the comment contains "lock spec" (e.g., "@claude lock spec"):

            1. Read ALL comments on this issue from oldest to newest.
            2. Identify the original issue title and body as the initial request.
            3. Find the Discovery comment (posted by Claude Code) with the codebase analysis and questions.
            4. Read all subsequent discussion comments for answers, decisions, and refinements.
            5. Synthesize everything into a finalized spec. Post it as a comment with this exact format:

            ```
            ## Finalized Spec

            ### Goal
            [One sentence: what this ticket accomplishes]

            ### Requirements
            - [Requirement 1 — derived from discussion]
            - [Requirement 2]

            ### Design Decisions
            - [Decision 1 — what was agreed and why]
            - [Decision 2]

            ### Scope
            **In scope:** [what's included]
            **Out of scope:** [what's explicitly excluded]

            ### Acceptance Criteria
            - [ ] [Testable criterion 1]
            - [ ] [Testable criterion 2]

            ---
            *Spec locked by Claude CI. Run `/github-ticket <number> --dev` locally to implement.*
            ```

            Important:
            - Only include information that was actually discussed or is clearly implied by the issue.
            - If critical information is missing, say so in the spec rather than inventing requirements.
            - Keep it concise — this becomes the PR description.

            ## 2. Deploy

            When the comment contains "deploy" (e.g., "@claude deploy to preview"):

            - **Preview**: Run `npm run build` then `vercel build` then `vercel deploy --prebuilt`. Report the preview URL.
            - **Production**: Run `npm run build` then `vercel build --prod` then `vercel deploy --prebuilt --prod`. Report the production URL.

            Always include the deployment URL in your response.

            ## 3. Anything Else

            For any other request, respond: "I can help with `lock spec` and `deploy` commands. For code changes, use Claude Code locally with `/github-ticket <number>`."
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
